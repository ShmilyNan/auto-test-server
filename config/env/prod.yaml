# 生产环境配置

# 多个 base_url 配置
# NOTE: 同一环境中不同接口可能需要不同的 base_url
# 用法: 测试用例中必须指定 base_url 别名，如 base_url: "operation"
base_urls:
  # 运营系统
  operation: "https://aly-us-ad-web.cdcicd.com"
  # siteId API
  siteId: "http://test-api.chongdaads.com"

# 默认请求头
headers:
  Content-Type: "application/json"
  Accept: "application/json"
  User-Agent: "AutoTestPlatform/1.0"
  X-Env: "production"

# 超时配置
timeout:
  connect: 15
  read: 45

# 数据库配置（通常不在生产环境直连）
database:
  host: ""
  port: 3306
  user: ""
  password: ""
  database: ""
