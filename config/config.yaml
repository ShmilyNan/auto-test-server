# 主配置文件
# =====================================

# 默认环境配置
default_env: test

# 项目信息
project:
  name: 接口自动化测试平台
  version: 1.0.0
  description: 基于-pytest的接口自动化测试框架

# HTTP-客户端配置
http_client:
  # 可选: requests 或 httpx
  type: httpx
  # 默认超时时间（秒）
  timeout: 60
  # 连接池大小
  max_connections: 100
  # 最大保持连接数
  max_keepalive_connections: 20
  # 是否启用连接池
  enable_pool: true
  # 重试次数
  max_retries: 3
  # 重试间隔（秒）
  retry_interval: 1
  # 忽略-ssl-验证
  verify_ssl: false

# 日志配置
logging:
  # 日志级别: TRACE, DEBUG, INFO, SUCCESS, WARNING, ERROR, CRITICAL
  level: INFO
  # 日志目录
  dir: logs
  # 是否控制台输出
  console: true
  # 是否文件输出
  file: true
  # 日志文件最大大小(MB)
  rotation: 10 MB
  # 日志保留天数
  retention: 7 days
  # 日志格式
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"

# 断言配置
assertion:
  # 是否启用-SQL断言
  enable_sql: true
  # 是否启用JSON Schema断言
  enable_schema: true
  # 是否启用正则断言
  enable_regex: true
  # 断言失败时是否继续执行
  continue_on_fail: false

# 通知配置
notification:
  # 是否启用通知
  enable: true
  # 通知级别: all, failed, error
  level: failed
  # 钉钉
  dingtalk:
    enable: false
    webhook: ""
    secret: ""
    at_mobiles: []
    at_all: false
  # 飞书
  feishu:
    enable: false
    webhook: ""
    at_mobiles: []
  # 企业微信
  wechat:
    enable: false
    webhook: ""
    mentioned_list: []
    mentioned_mobile_list: []
  # 邮箱
  email:
    enable: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    sender: "test@example.com"
    password: ""
    receivers: ["receiver@example.com"]
    subject: "测试报告通知"

# Allurement
allure:
  # 报告标题
  title: "接口自动化测试报告"
  # 报告语言: zh-CN, en-US, ru
  language: zh-CN
  # 自定义环境变量
  environment:
    - name: 环境
      variable: env
    - name: 版本
      variable: project.version
    - name: 超时时间
      variable: http_client.timeout

# 测试数据配置
test_data:
  # 测试数据目录
  dir: test_data
  # 是否自动发现测试文件
  auto_discovery: true
  # 支持的文件后缀
  extensions: 
    - .yaml
    - .yml
    - .json
  # 是否进行数据校验
  validate: true
