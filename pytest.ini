[pytest]
# pytest配置文件

# 测试用例目录
testpaths = src/api

# 测试文件模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = 
    -v
    -s
    --strict-markers
    --tb=short
    --alluredir=reports/allure
    --clean-alluredir

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    daily: 每日巡检
    p0: P0级用例
    p1: P1级用例
    p2: P2级用例
    p3: P3级用例
    slow: 慢速测试
    skip: 跳过测试
    xfail: 预期失败

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 最小Python版本
minversion = 7.0

# 设置异步测试的事件循环作用域
;function    # 每个函数一个事件循环
;class       # 每个类一个事件循环
;module      # 每个模块一个事件循环
;session     # 整个测试会话一个事件循环
asyncio_default_fixture_loop_scope = function