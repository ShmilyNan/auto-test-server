# 用户模块测试用例示例
# ========================================

# 模块信息
module:
  name: "登录模块"
  version: "1.0.0"
  description: "登录相关接口测试"
  author: "Lee"

# 全局配置
config:
  # 默认请求头
  headers:
    Content-Type: "application/json"
    Accept: "application/json"
  
  # 默认超时时间
  timeout: 30

# 测试用例列表
test_cases:
  # ========================================
  # 用例1: 用户登录
  # ========================================
  - name: "用户登录-正常流程"
    description: "测试用户正常登录"
    order: 0
    priority: "p0"
    tags: ["smoke", "daily", "skip"]
    
    method: "POST"
    url: "/prod-api/login"

    body:
      username: "Lee"
      password: "Working@1130"

    validate:
      - type: "status_code"
        expected: 200
      
      - type: "eq"
        path: "body.code"
        expected: 200
      
      - type: "is_not_none"
        path: "body.token"
    
    extract:
      access_token:
        type: "jsonpath"
        expression: "$.token"
    
    metadata:
      feature: "用户登录"
      severity: "critical"

  # ========================================
  # 用例2: 获取用户信息
  # ========================================
  - name: "获取用户信息-已登录"
    description: "获取已登录用户的详细信息"
    priority: "p1"
    tags: ["regression", "single"]
    
    # 依赖登录用例
    depends_on: "用户登录-正常流程"
    
    method: "GET"
    url: "/prod-api/getInfo"
    
#    headers:
#      Authorization: "Bearer ${$extract.access_token}"
    
    validate:
      - type: "status_code"
        expected: 200
      
      - type: "eq"
        path: "body.code"
        expected: 200
      
      - type: "eq"
        path: "body.user.userName"
        expected: "Lee"
      
      - type: "type"
        path: "body.user"
        expected: "dict"
      
      # JSON Schema验证
      - type: "json_schema"
        path: "body.user"
        schema:
          type: "object"
          required: ["userId", "userName", "nickName"]
          properties:
            userId:
              type: "integer"
            userName:
              type: "string"
            nickName:
              type: "string"

  # ========================================
  # 用例3: 获取用户权限
  # ========================================
  - name: "获取用户权限-成功"
    description: "获取用户权限列表"
    priority: "p2"
    tags: ["regression"]
    
    method: "GET"
    url: "/prod-api/getRouters"
    
#    headers:
#      Authorization: "Bearer ${$extract.access_token}"
    
    validate:
      - type: "status_code"
        expected: 200
      
      - type: "eq"
        path: "body.code"
        expected: 200
      
      - type: "type"
        path: "body.data"
        expected: "list"

  # ========================================
  # 用例4: 用户登出
  # ========================================
  - name: "用户登出"
    description: "用户正常登出"
    priority: "p1"
    tags: ["regression","skip"]
    
    method: "POST"
    url: "/prod-api/logout"
    
#    headers:
#      Authorization: "Bearer ${$extract.access_token}"
    
    validate:
      - type: "status_code"
        expected: 200

  # ========================================
  # 用例5: 用户登录-密码错误
  # ========================================
  - name: "用户登录-密码错误"
    description: "测试登录时输入错误密码"
    priority: "p2"
    tags: ["regression", "negative", "skip"]
    
    method: "POST"
    url: "/prod-api/login"

    body:
      username: "Lee"
      password: "Working@0610"

    validate:
      - type: "status_code"
        expected: 200
      
      - type: "eq"
        path: "body.code"
        expected: 500
      
      - type: "in"
        path: "body.msg"
        expected: ["密码错误", "用户不存在", "invalid password"]

  # ========================================
  # 用例8: 并发请求
  # ========================================
  - name: "用户信息查询-并发"
    description: "测试并发查询用户信息"
    priority: "p3"
    tags: ["performance","skip"]

    method: "GET"
    url: "/user/info"

#    headers:
#      Authorization: "Bearer ${$extract.access_token}"

    validate:
      - type: "status_code"
        expected: 200

      - type: "lt"
        path: "elapsed"  # 响应时间
        expected: 1.0  # 小于1秒

  # ========================================
  # 用例9: 使用SQL断言
  # ========================================
  - name: "用户注册后数据库验证"
    description: "注册成功后验证数据库记录"
    priority: "p1"
    tags: ["database","skip"]

    method: "POST"
    url: "/user/register"

    body:
      username: "sql_test_${timestamp()}"
      password: "Test@123456"
      email: "sql_test_${timestamp()}@example.com"

    validate:
      - type: "status_code"
        expected: 200

      # SQL断言（需要数据库配置）
      - type: "sql"
        sql: "SELECT COUNT(*) FROM users WHERE username = '${body.data.username}'"
        expected: 1

      - type: "sql"
        sql: "SELECT status FROM users WHERE user_id = ${body.data.user_id}"
        expected: "active"

  # ========================================
  # 用例10: 文件上传
  # ========================================
  - name: "用户头像上传"
    description: "测试用户头像上传功能"
    priority: "p2"
    tags: ["file","skip"]

    method: "POST"
    url: "/user/avatar"

    headers:
      Authorization: "Bearer ${$extract.access_token}"

    # 文件上传
    files:
      avatar: "test_data/avatar.jpg"

    params:
      type: "avatar"

    validate:
      - type: "status_code"
        expected: 200

      - type: "is_not_none"
        path: "body.data.url"

      - type: "regex"
        path: "body.data.url"
        pattern: "^https?://.*\\.(jpg|png|jpeg)$"

# ========================================
# 测试套件配置
# ========================================
test_suites:
  - name: "用户注册流程"
    cases:
      - "用户登录-正常流程"
      - "获取用户信息-已登录"
      - "获取用户权限-成功"
      - "用户登出"
  
  - name: "用户登录异常场景"
    cases:
      - "用户登录-密码错误"

  - name: "冒烟测试"
    cases:
      - "用户登录-正常流程"
      - "获取用户信息-已登录"
