# 测试环境登录用例，用于前置登录
# ========================================

# 模块信息
module:
  name: "登录模块"
  version: "1.0.0"
  description: "测试环境登录"
  author: "Lee"

# 全局配置
config:
  headers:
    Content-Type: "application/json"
    Accept: "application/json"
  timeout: 30

# 测试用例列表
test_cases:
  # ========================================
  # 用例1: operation系统用户登录
  # ========================================
  - name: "operation系统用户登录"
    description: "测试环境operation系统用户登录，获取认证token"
    order: 0
    priority: "p0"
    tags: ["login", "auth"]

    base_url: "operation"
    method: "POST"
    url: "/prod-api/login"

    headers:
      Content-Type: "application/json"

    body:
      username: "Lee"
      password: "Working@1130"

    assertions:
      - type: status_code
        expected: 200

      - type: eq
        path: body.code
        expected: 200

      - type: is_not_none
        path: body.token

    extractions:
      - name: auth_token
        type: jsonpath
        expression: "$.token"

    metadata:
      feature: "用户登录"
      role: "user"
      env: "test"

  # ========================================
  # 用例2: dsp系统用户登录
  # ========================================
  - name: "dsp系统用户登录"
    description: "测试环境dsp系统用户登录登录，获取token"
    order: 1
    priority: "p0"
    tags: ["login", "auth"]

    base_url: "dsp"
    method: "POST"
    url: "/prod-api/base/login"

    headers:
      Content-Type: "application/json"

    body:
      username: "lishoucheng"
      password: "123123"

    assertions:
      - type: "status_code"
        expected: 200

      - type: "eq"
        path: "body.msg"
        expected: "登录成功"

      - type: "is_not_none"
        path: "body.data"

    extractions:
      - name: auth_token
        type: "jsonpath"
        expression: "$.data.token"

    metadata:
      feature: "用户登录"
      role: "admin"
      env: "test"
