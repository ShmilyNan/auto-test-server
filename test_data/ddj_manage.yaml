# DDJ 模块测试用例示例
# ========================================

# 模块信息
module:
  name: "DDJ 策略管理模块"
  version: "1.0.0"
  description: "DDJ 策略管理相关接口测试"
  author: "Lee"

# 全局配置
config:
  # 默认请求头
  headers:
    Content-Type: "application/json"
    Accept: "application/json"
  
  # 默认超时时间
  timeout: 30

# 测试用例列表
test_cases:
    # ========================================
  # 用例1: 获取 AdxIdList
  # ========================================
  - name: "DDJ-AdxIdList"
    description: "DDJ-AdxIdList"
    order: 0
    priority: "p2"
    tags: ["smoke", "daily"]

    base_url: "operation"
    method: "GET"
    url: "/prod-api/offer-package/devicePkg/getAdxIdList"
    require_login: true

    assertions:
      - type: "status_code"
        expected: 200
      
      - type: "eq"
        path: "body.code"
        expected: 200

      - type: "eq"
        path: "body.msg"
        expected: "操作成功"

      - type: "is_not_none"
        path: "body.data"

    metadata:
      feature: "get AdxIdList"
      severity: "critical"

  # ========================================
  # 用例2: validCreateDevicePkg 打包前的验证
  # ========================================
  - name: "DDJ-打包验证"
    description: "DDJ-打包前验证"
    order: 0
    priority: "p2"
    tags: [ "smoke", "daily" ]

    base_url: "operation"
    method: "POST"
    url: "/prod-api/offer-package/devicePkg/validCreateDevicePkg"
    require_login: true

    body:
      adxIdParam: "17"
      dataUpdateTime: "3"
      dataUpdateTimeUnit: 1
      dimDevice: 1
      dimParam: "country"
      effectiveTime: "3"
      effectiveTimeUnit: 1
      iabs: "IAB19-25"
      name: "test数据包"
      ngPkgTrafficApps: []
      os: 1
      osVersionMax: "20"
      osVersionMin: "10"
      pkgAdxIds: [10,-1,3,12,17,18,19,20,21,23,22,24,25,26,28,33,32,35]
      pkgCountry:
        - countryId: 3209
          countryCode: "AZ"
      pkgTrafficApps:
        - "com.mpokket.app"
        - "com.storymatrix.drama"
        - "com.freereels.app"
      pkgType: 1
      remark: "test"
      trafficSource: 1

    assertions:
      - type: "status_code"
        expected: 200

      - type: "eq"
        path: "body.code"
        expected: 200

      - type: "eq"
        path: "body.msg"
        expected: "操作成功"

      - type: "is_not_none"
        path: "body.data"

    metadata:
      feature: "validCreateDevicePkg"
      severity: "critical"

  # ========================================
  # 用例2: DDj-add-制作数据包
  # ========================================
  - name: "DDj-add-制作数据包"
    description: "验证通过，执行制作数据包"
    order: 1
    priority: "p2"
    tags: [ "smoke", "daily" ]

    base_url: "operation"
    method: "POST"
    url: "/prod-api/offer-package/devicePkg/add"
    require_login: true

    body:
      adxIdParam: "17"
      dataUpdateTime: "3"
      dataUpdateTimeUnit: 1
      dimDevice: 1
      dimParam: "country"
      effectiveTime: "3"
      effectiveTimeUnit: 1
      iabs: "IAB19-25"
      name: "test数据包"
      ngPkgTrafficApps: [ ]
      os: 1
      osVersionMax: "20"
      osVersionMin: "10"
      pkgAdxIds: [ 10,-1,3,12,17,18,19,20,21,23,22,24,25,26,28,33,32,35 ]
      pkgCountry:
        - countryId: 3209
          countryCode: "AZ"
      pkgTrafficApps:
        - "com.mpokket.app"
        - "com.storymatrix.drama"
        - "com.freereels.app"
      pkgType: 1
      remark: "test"
      trafficSource: 1

    assertions:
      - type: "status_code"
        expected: 200

      - type: "eq"
        path: "body.code"
        expected: 200

      - type: "eq"
        path: "body.msg"
        expected: "操作成功"

      - type: "is_not_none"
        path: "body.data"

    metadata:
      feature: "validCreateDevicePkg"
      severity: "critical"

# ========================================
# 测试套件配置
# ========================================
test_suites:
  - name: "用户注册流程"
    cases:
      - "用户登录-正常流程"
      - "获取用户信息-已登录"
      - "获取用户权限-成功"
      - "用户登出"
  
  - name: "用户登录异常场景"
    cases:
      - "用户登录-密码错误"

  - name: "冒烟测试"
    cases:
      - "用户登录-正常流程"
      - "获取用户信息-已登录"
